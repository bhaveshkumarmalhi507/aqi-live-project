name: AQI Live Data Fetch

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    # 🔥 LOAD GITHUB SECRET
    env:
      OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}

    steps:

    # =========================
    # CHECKOUT REPOSITORY
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # SETUP PYTHON
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # INSTALL PACKAGES
    # =========================
    - name: Install dependencies
      run: pip install pandas requests

    # =========================
    # RUN AQI SCRIPT
    # =========================
    - name: Run AQI Script
      run: python fetch_data.py

    # =========================
    # COMMIT & PUSH DATASET
    # =========================
    - name: Commit & Push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add .

        git commit -m "Auto update AQI dataset" || echo "No changes"

        git push